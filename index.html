<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreakyFit | Unleash Your Beast</title>
    <style>
        :root {
            --primary-color: #e63946; /* High-energy red */
            --dark-bg: #121212;
            --text-light: #f1faee;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            background-color: var(--dark-bg);
            color: var(--text-light);
            text-transform: uppercase;
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-color);
        }

        .logo { font-size: 2rem; color: var(--primary-color); }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
        }

        .hero h1 { font-size: 4rem; margin-bottom: 10px; }

        .cta-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.2rem;
            border-radius: 5px;
            transition: 0.3s;
        }

        .cta-btn:hover { transform: scale(1.1); }

        .categories {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px;
        }

        .cat-card {
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            position: relative;
            text-decoration: none;
            color: white;
        }

        .cat-card h2 {
            z-index: 2;
            font-size: 2.5rem;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
        }

        .mens { background-image: url('https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&w=800&q=80'); }
        .womens { background-image: url('https://images.unsplash.com/photo-1518310383802-640c2de311b2?auto=format&fit=crop&w=800&q=80'); }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">FREAKYFIT</div>
        <nav>
            <a href="#shop">Shop</a>
            <a href="#about">Our Vibe</a>
            <a href="#cart">Cart (0)</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Stay Weird. Get Fit.</h1>
        <p>Premium Performance Gear for the Obsessed.</p>
        <a href="#shop" class="cta-btn">Shop Now</a>
    </section>

    <section class="categories" id="shop">
        <a href="#" class="cat-card mens">
            <h2>Men</h2>
        </a>
        <a href="#" class="cat-card womens">
            <h2>Women</h2>
        </a>
    </section>

    <footer>
        <p>&copy; 2026 FreakyFit Apparel. No Pain, No Gain.</p>
    </footer>

</body>
</html>
