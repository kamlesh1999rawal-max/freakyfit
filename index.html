<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreakyFit | Unleash Your Beast</title>
    <style>
        :root {
            --primary-color: #e63946; /* High-energy red */
            --dark-bg: #121212;
            --text-light: #f1faee;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            background-color: var(--dark-bg);
            color: var(--text-light);
            text-transform: uppercase;
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-color);
        }

        .logo { font-size: 2rem; color: var(--primary-color); }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
        }

        .hero h1 { font-size: 4rem; margin-bottom: 10px; }

        .cta-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.2rem;
            border-radius: 5px;
            transition: 0.3s;
        }

        .cta-btn:hover { transform: scale(1.1); }

        .categories {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px;
        }

        .cat-card {
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            position: relative;
            text-decoration: none;
            color: white;
        }

        .cat-card h2 {
            z-index: 2;
            font-size: 2.5rem;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
        }
