<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreakyFit | Stay Weird. Get Fit.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #000;
            color: #fff;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: #ff3e3e; /* Added a punchy accent color */
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ff3e3e;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ccc;
        }

        .cta-btn {
            background-color: #ff3e3e;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            transition: transform 0.3s, background 0.3s;
        }

        .cta-btn:hover {
            transform: scale(1.05);
            background-color: #e32b2b;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            height: 80vh;
        }

        .cat-card {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: white;
            background-size: cover;
            background-position: center;
            transition: all 0.5s ease;
            overflow: hidden;
            position: relative;
        }

        .cat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            transition: background 0.3s;
        }

        .cat-card:hover::before {
            background: rgba(0,0,0,0.1);
        }

        .cat-card:hover {
            transform: scale(1.02);
            z-index: 2;
        }

        .cat-card h2 {
            position: relative;
            font-size: 3rem;
            text-transform: uppercase;
            border: 4px solid #fff;
            padding: 10px 30px;
            transition: all 0.3s;
        }

        .cat-card:hover h2 {
            background: #fff;
            color: #000;
        }

        .mens { background-image: url('https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&w=800&q=80'); }
        .womens { background-image: url('https://images.unsplash.com/photo-1518310383802-640c2de311b2?auto=format&fit=crop&w=800&q=80'); }

        footer {
            text-align: center;
            padding: 60px 20px;
            font-size: 0.8rem;
            color: #666;
            background: #0a0a0a;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">FREAKYFIT</div>
        <nav>
            <a href="#shop">Shop</a>
            <a href="#about">Our Vibe</a>
            <a href="#cart">Cart (0)</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Stay Weird. Get Fit.</h1>
        <p>Premium Performance Gear for the Obsessed.</p>
        <a href="#shop" class="cta-btn">Shop Now</a>
    </section>

    <section class="categories" id="shop">
        <a href="#" class="cat-card mens">
            <h2>Men</h2>
        </a>
        <a href="#" class="cat-card womens">
            <h2>Women</h2>
        </a>
    </section>

    <footer>
        <p>&copy; 2026 FreakyFit Apparel. No Pain, No Gain.</p>
    </footer>

</body>
</html>
